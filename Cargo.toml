[package]
name = "rpg_tournament"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { git="https://github.com/bevyengine/bevy.git", tag="v0.13.2" }

[dev-dependencies]
bevy = { git="https://github.com/bevyengine/bevy.git", tag="v0.13.2", features = ["dynamic_linking"] }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[target.wasm32-unknown-unknown]
runner = "wasm-server-runner"