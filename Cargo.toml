[package]
name = "rpg_tournament"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = "0.13.2"
bevy-inspector-egui = { version = "0.24.0", optional = true }

[dev-dependencies]
bevy = { version = "0.13.2", features = ["dynamic_linking"] }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[target.wasm32-unknown-unknown]
runner = "wasm-server-runner"

[features]
inspector = [ "dep:bevy-inspector-egui" ]
